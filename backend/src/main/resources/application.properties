spring.application.name=ecommerce-backend

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway is enabled only for the `psql` profile (PostgreSQL).
# Keep it disabled for the default H2 profile because migrations use PostgreSQL-specific types (e.g., JSONB).
spring.flyway.enabled=false

# PostgreSQL Database configuration (Uncomment and configure later)
# spring.datasource.url=jdbc:postgresql://${POSTGRES_IP}:5432/${POSTGRES_DB}
# spring.datasource.username=${POSTGRES_USER}
# spring.datasource.password=${POSTGRES_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate auto table generation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Google OAuth2
google.client.id=522600015450-aafpbr1ongsap0s6fuusk59ekipm8hca.apps.googleusercontent.com

# PayOS (VietQR / Napas)
# enabled=false để dev không cần credential; frontend URL / webhook URL chỉ lấy từ các key sau (không hardcode trong Java).
payos.enabled=false
payos.client-id=
payos.api-key=
payos.checksum-key=
payos.frontend-base-url=http://localhost:5173
# URL công khai đầy đủ của backend (HTTPS), ví dụ https://your-api.example.com/api/payment/webhook — dùng cho POST /api/payment/confirm-webhook khi body trống
payos.webhook-public-url=
